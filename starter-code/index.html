<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./css/main.css" />
    <title>Frontend Mentor | Flashcard app</title>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="app__container">
      <header class="app__header">
        <a href="./index.html" aria-label="Flashcards home">
          <img
            src="./assets/images/logo-large.svg"
            alt="Flashcards"
            class="app__logo"
          />
        </a>

        <nav class="app__nav" aria-label="Primary">
          <button type="button" class="btn active text-preset-4-semibold">
            Study Mode
          </button>
          <button type="button" class="btn text-preset-4-semibold">
            All Cards
          </button>
        </nav>
      </header>
      <main class="app__main">
        <section class="app__card">
          <div class="card__header">
            <div class="card__categories">
              <button class="btn__category text-preset-3 fw-regular">
                All Categories
                <span>
                  <img
                    src="./assets/images/icon-chevron-down.svg"
                    alt="Expand categories"
                  />
                </span>
              </button>
              <!-- <ul class="list_categories"></ul> -->
              <div>
                <input
                  type="checkbox"
                  id="Hide Mastered"
                  name="Hide Mastered"
                />
                <label for="Hide Mastered">Hide Mastered</label>
              </div>
            </div>
            <button class="btn__suffle text-preset-3 fw-regular">
              <span
                ><img
                  src="./assets/images/icon-shuffle.svg"
                  alt="Shuffle cards"
              /></span>
              Shuffle
            </button>
          </div>
          <div class="card__flashcard">
            <div class="card__flashcard__content">
              <div class="card__flashcard__hero"></div>
              <!-- Category badge -->
              <div class="card__flashcard__category">
                <span class="badge">Web Development</span>
              </div>
              <!-- Card content -->
              <div class="card__flashcard__body">
                <h2 class="card__flashcard__question">
                  What does HTML stand for?
                </h2>
                <p class="card__flashcard__hint">Click to reveal answer</p>
              </div>
              <div class="card__flashcard__btn">
                <button class="btn__know">
                  <img
                    src="./assets/images/icon-circle-check.svg"
                    alt="I know this card"
                  />
                  I know this
                </button>
                <button class="btn__dont-know">
                  <img
                    src="./assets/images/icon-reset.svg"
                    alt="reset card progress"
                  />
                  Reset Progress
                </button>
              </div>
            </div>
          </div>
        </section>
        <section class="card__statistics"></section>
      </main>
    </div>
  </body>
</html>
