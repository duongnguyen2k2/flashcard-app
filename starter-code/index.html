<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./css/main.css" />
    <title>Frontend Mentor | Flashcard app</title>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <header class="app__header">
      <div class="app__logo">
        <a href="./index.html" aria-label="Flashcards home">
          <img src="./assets/images/logo-small.svg" alt="Flashcards" />
        </a>
        <p class="text-preset-1">Flashcard</p>
      </div>

      <nav class="app__nav" aria-label="Primary">
        <button type="button" class="btn active text-preset-4-semibold">
          Study Mode
        </button>
        <button type="button" class="btn text-preset-4-semibold">
          All Cards
        </button>
      </nav>
    </header>
    <section class="app__card">
      <div class="card__questions">
        <div class=""></div>
        <div class="card__categories">
          <h1 class="title">All Categories</h1>
          <ul class="list_categories"></ul>
        </div>
      </div>
      <div class="card__statistics"></div>
    </section>
  </body>
</html>
