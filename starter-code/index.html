<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./css/main.css" />
    <title>Frontend Mentor | Flashcard app</title>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="app__container">
      <header class="app__header">
        <a href="./index.html" aria-label="Flashcards home">
          <img
            src="./assets/images/logo-large.svg"
            alt="Flashcards"
            class="app__logo"
          />
        </a>

        <nav class="app__nav" aria-label="Primary">
          <button type="button" class="btn active text-preset-4 fw-semibold">
            Study Mode
          </button>
          <button type="button" class="btn text-preset-4 fw-semibold">
            All Cards
          </button>
        </nav>
      </header>
      <main class="app__main">
        <section class="app__card">
          <div class="card__header">
            <div class="card__categories">
              <button class="btn__category text-preset-3 fw-regular">
                All Categories
                <span>
                  <img
                    src="./assets/images/icon-chevron-down.svg"
                    alt="Expand categories"
                  />
                </span>
              </button>
              <!-- <ul class="list_categories"></ul> -->
              <div>
                <input
                  type="checkbox"
                  id="Hide Mastered"
                  name="Hide Mastered"
                />
                <label for="Hide Mastered">Hide Mastered</label>
              </div>
            </div>
            <button class="btn__suffle text-preset-3 fw-regular">
              <span
                ><img
                  src="./assets/images/icon-shuffle.svg"
                  alt="Shuffle cards"
              /></span>
              Shuffle
            </button>
          </div>
          <div class="card__flashcard">
            <div class="card__flashcard__content">
              <div class="card__flashcard__hero"></div>
              <div class="card__flashcard__star_blue"></div>
              <div class="card__flashcard__star_yellow"></div>
              <!-- Category badge -->
              <div class="card__flashcard__category relative">
                <span class="badge">Web Development</span>
              </div>
              <!-- Card content -->
              <div class="card__flashcard__body relative">
                <h2 class="card__flashcard__question text-preset-1 fw-bold">
                  What does HTML stand for?
                </h2>
                <p class="card__flashcard__hint text-preset-3 fw-regular">
                  Click to reveal answer
                </p>
              </div>
              <div class="card__flashcard__progress" style="--progress: 0%">
                <div class="progress__track">
                  <div class="progress__fill"></div>
                  <!-- width lấy từ --progress -->
                </div>
                <span class="progress__label">0/5</span>
              </div>
            </div>
            <div class="card__flashcard__btn">
              <button class="btn__know">
                <img
                  src="./assets/images/icon-circle-check.svg"
                  alt="I know this card"
                />
                I know this
              </button>
              <button class="btn__progress">
                <img
                  src="./assets/images/icon-reset.svg"
                  alt="reset card progress"
                />
                Reset Progress
              </button>
            </div>
          </div>
          <footer class="card-nav" aria-label="Card navigation">
            <button
              class="btn-outline btn-nav btn-nav--prev text-preset-3 fw-bold text-neutral-600"
              aria-label="Previous card"
            >
              <img
                src="./assets/images/icon-chevron-left.svg"
                alt="previous-icon"
              />
              Previous
            </button>

            <p class="card-nav__counter" aria-live="polite">Card 1 of 40</p>

            <button
              class="btn-outline btn-nav btn-nav--next text-preset-3 fw-bold text-neutral-600"
              aria-label="Next card"
            >
              Next
              <img
                src="./assets/images/icon-chevron-right.svg"
                alt="previous-icon"
              />
            </button>
          </footer>
        </section>
        <section class="card__statistics">
          <h2 class="stats-panel__title">Study Statistics</h2>

          <ul class="stats-list" role="list">
            <li class="stat-card stat-card--total-cards">
              <div class="stat-card__info">
                <span class="stat-card__label text-preset-3">Total Cards</span>
                <strong class="stat-card__value text-preset-1 fw-bold"
                  >40</strong
                >
              </div>
              <div class="stat-card__accent bg-blue-400" aria-hidden="true">
                <img
                  src="./assets/images/icon-stats-total.svg"
                  alt=""
                  class="stat-card__icon"
                />
              </div>
            </li>

            <li class="stat-card stat-card--mastered">
              <div class="stat-card__info">
                <span class="stat-card__label text-preset-3">Mastered</span>
                <strong class="stat-card__value text-preset-1 fw-bold"
                  >11</strong
                >
              </div>
              <div class="stat-card__accent bg-teal-400" aria-hidden="true">
                <img
                  src="./assets/images/icon-stats-mastered.svg"
                  alt=""
                  class="stat-card__icon"
                />
              </div>
            </li>

            <li class="stat-card stat-card--in-progress">
              <div class="stat-card__info">
                <span class="stat-card__label text-preset-3">In Progress</span>
                <strong class="stat-card__value text-preset-1 fw-bold"
                  >21</strong
                >
              </div>
              <div class="stat-card__accent bg-pink-500" aria-hidden="true">
                <img
                  src="./assets/images/icon-stats-in-progress.svg"
                  alt=""
                  class="stat-card__icon"
                />
              </div>
            </li>

            <li class="stat-card stat-card--not-started">
              <div class="stat-card__info">
                <span class="stat-card__label text-preset-3">Not Started</span>
                <strong class="stat-card__value text-preset-1 fw-bold"
                  >8</strong
                >
              </div>
              <div class="stat-card__accent bg-pink-400" aria-hidden="true">
                <img
                  src="./assets/images/icon-stats-not-started.svg"
                  alt=""
                  class="stat-card__icon"
                />
              </div>
            </li>
          </ul>
        </section>
      </main>
    </div>
  </body>
</html>
