<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./css/main.css" />
    <title>Frontend Mentor | Flashcard app</title>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <main class="app__main">
      <header class="app__header">
        <div class="app__header-inner">
          <a href="./index.html" aria-label="Flashcards home">
            <img
              class="app__logo"
              src="./assets/images/logo-small.svg"
              alt="Flashcards"
            />
          </a>

          <nav class="view-nav" aria-label="Primary">
            <button
              type="button"
              class="view-nav__button view-nav__button--active"
              aria-current="page"
            >
              Study Mode
            </button>
            <button type="button" class="view-nav__button" disabled>
              All Cards
            </button>
          </nav>
        </div>
      </header>
      <div class="study-layout">
        <section class="study-layout__content" aria-labelledby="study-heading">
          <h1 id="study-heading" class="section-heading">Study Mode</h1>

          <p class="loading-state" data-loading-state>Loading flashcards...</p>
          <p class="error-state is-hidden" data-error-state role="alert"></p>

          <div class="is-hidden" data-study-content>
            <article class="study-card" data-study-card aria-live="polite">
              <!-- Rendered by JavaScript -->
            </article>

            <div class="study-meta">
              <p class="study-meta__counter" data-card-counter>Card 1 of 40</p>

              <div class="study-actions">
                <button type="button" class="btn btn--primary" disabled>
                  I Know This
                </button>
                <button type="button" class="btn btn--secondary" disabled>
                  Reset Progress
                </button>
              </div>
            </div>

            <div class="study-actions">
              <button type="button" class="btn btn--secondary" disabled>
                Previous
              </button>
              <button type="button" class="btn btn--secondary" disabled>
                Next
              </button>
            </div>
          </div>
        </section>

        <aside class="study-layout__sidebar" aria-labelledby="stats-heading">
          <section class="stats-panel">
            <h2 id="stats-heading" class="stats-panel__title">
              Study Statistics
            </h2>
            <ul class="stats-list" data-stats-list>
              <!-- Rendered by JavaScript -->
            </ul>
          </section>
        </aside>
      </div>
    </main>
  </body>
</html>
